<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🚀 太空射击</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    background: #000; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    height: 100dvh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
}
canvas { 
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    max-height: 100dvh;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// 响应式画布
function resize() {
    let ratio = 3/4;
    let w = window.innerWidth;
    let h = window.innerHeight;
    let windowRatio = w / h;
    
    if (windowRatio > ratio) {
        canvas.height = h;
        canvas.width = h * ratio;
    } else {
        canvas.width = w;
        canvas.height = w / ratio;
    }
}
resize();
window.addEventListener('resize', resize);

// 音效系统
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function initAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
}

function playSound(type) {
    if (!audioCtx) return;
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    switch(type) {
        case 'shoot':
            osc.frequency.value = 800;
            osc.type = 'square';
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
            break;
        case 'hit':
            osc.frequency.value = 200;
            osc.type = 'sawtooth';
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
            break;
        case 'boom':
            osc.frequency.value = 100;
            osc.type = 'sawtooth';
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
            break;
        case 'powerup':
            osc.frequency.value = 600;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.3);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
            break;
    }
}

// 游戏状态
let screen = 'start'; // start, playing, gameover
let game = {
    score: 0,
    kills: 0,
    combo: 0,
    comboTimer: 0,
    maxCombo: 0,
    level: 1,
    spawnTimer: 0,
    spawnRate: 60,
    shakeX: 0,
    shakeY: 0,
    shakeTime: 0,
    highScore: parseInt(localStorage.getItem('highScore') || '0')
};

// 玩家
let player = {
    x: 0, y: 0,
    width: 40,
    height: 40,
    speed: 6,
    lives: 3,
    invincible: 0,
    powerLevel: 1
};

// 游戏对象
let stars = [];
let bullets = [];
let enemies = [];
let particles = [];
let powerUps = [];
let explosions = [];
let boss = null;

// 初始化星星
function initStars() {
    stars = [];
    for (let i = 0; i < 200; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 0.5,
            speed: Math.random() * 2 + 0.5,
            brightness: Math.random()
        });
    }
}
initStars();

// 敌人类型
const enemyTypes = [
    { width: 30, height: 30, speed: 2, hp: 1, score: 10, color: '#ff0040', pattern: 'straight' },
    { width: 35, height: 35, speed: 1.5, hp: 2, score: 20, color: '#ff8800', pattern: 'zigzag' },
    { width: 40, height: 40, speed: 1, hp: 3, score: 30, color: '#ff00ff', pattern: 'sine' },
    { width: 50, height: 50, speed: 0.8, hp: 5, score: 50, color: '#00ff00', pattern: 'chase' }
];

// Boss配置
function createBoss() {
    let hp = 20 + game.level * 10;
    return {
        x: canvas.width / 2,
        y: -80,
        width: 100,
        height: 80,
        hp: hp,
        maxHp: hp,
        speed: 1,
        color: '#ff0080',
        timer: 0,
        phase: 0,
        shootTimer: 0,
        targetY: 80,
        entering: true
    };
}

// 道具类型
const powerUpTypes = [
    { type: 'power', color: '#ff0', symbol: '⚡', name: '火力增强' },
    { type: 'life', color: '#0f0', symbol: '❤️', name: '额外生命' },
    { type: 'shield', color: '#0ff', symbol: '🛡️', name: '护盾' }
];

// 初始化游戏
function init() {
    player.x = canvas.width / 2;
    player.y = canvas.height * 0.85;
    player.lives = 3;
    player.invincible = 0;
    player.powerLevel = 1;
    bullets = [];
    enemies = [];
    particles = [];
    powerUps = [];
    explosions = [];
    boss = null;
    game.score = 0;
    game.kills = 0;
    game.combo = 0;
    game.comboTimer = 0;
    game.maxCombo = 0;
    game.level = 1;
    game.spawnTimer = 0;
    game.spawnRate = 60;
    game.shakeTime = 0;
    screen = 'playing';
}

// 创建爆炸
function createExplosion(x, y, size, color) {
    for (let i = 0; i < size; i++) {
        let angle = (Math.PI * 2 / size) * i + Math.random() * 0.5;
        let speed = Math.random() * 4 + 2;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            decay: Math.random() * 0.02 + 0.02,
            size: Math.random() * 4 + 2,
            color: color || '#ff0'
        });
    }
    explosions.push({
        x, y,
        radius: 0,
        life: 1,
        color: color || '#ff0'
    });
    game.shakeTime = Math.min(game.shakeTime + 8, 20);
}

// 发射子弹
function shoot() {
    if (screen !== 'playing') return;
    playSound('shoot');
    
    let power = player.powerLevel;
    let bSpeed = -10 * (canvas.height / 800);
    
    bullets.push({ x: player.x, y: player.y - 20, vx: 0, vy: bSpeed, size: 3, color: '#0ff' });
    
    if (power >= 2) {
        bullets.push({ x: player.x - 15, y: player.y - 15, vx: -0.5, vy: bSpeed, size: 3, color: '#0ff' });
        bullets.push({ x: player.x + 15, y: player.y - 15, vx: 0.5, vy: bSpeed, size: 3, color: '#0ff' });
    }
    if (power >= 3) {
        bullets.push({ x: player.x - 25, y: player.y - 10, vx: -1.5, vy: bSpeed * 0.9, size: 3, color: '#0f0' });
        bullets.push({ x: player.x + 25, y: player.y - 10, vx: 1.5, vy: bSpeed * 0.9, size: 3, color: '#0f0' });
    }
    if (power >= 4 && enemies.length > 0) {
        let target = enemies[Math.floor(Math.random() * enemies.length)];
        let dx = target.x - player.x;
        let dy = target.y - player.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        bullets.push({ 
            x: player.x, y: player.y - 25, 
            vx: (dx/dist) * 5, vy: (dy/dist) * 5, 
            size: 4, color: '#f0f', homing: true 
        });
    }
}

// 绘制星星
function drawStars() {
    stars.forEach(s => {
        let b = s.brightness * (0.5 + 0.5 * Math.sin(Date.now() * 0.001 + s.x));
        ctx.fillStyle = `rgba(255, 255, 255, ${b})`;
        ctx.fillRect(s.x, s.y, s.size, s.size);
    });
}

// 绘制玩家
function drawPlayer() {
    if (player.invincible > 0 && Math.floor(player.invincible / 3) % 2) return;
    
    ctx.save();
    // 尾焰
    for (let i = 0; i < 3; i++) {
        let flameSize = Math.random() * 15 + 10;
        ctx.fillStyle = `rgba(0, 200, 255, ${0.5 - i * 0.15})`;
        ctx.beginPath();
        ctx.moveTo(player.x - 8 + i*2, player.y + 20);
        ctx.lineTo(player.x + 8 - i*2, player.y + 20);
        ctx.lineTo(player.x, player.y + 20 + flameSize);
        ctx.fill();
    }
    
    // 飞船主体
    ctx.fillStyle = '#0ff';
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.moveTo(player.x, player.y - 25);
    ctx.lineTo(player.x - 20, player.y + 15);
    ctx.lineTo(player.x - 5, player.y + 10);
    ctx.lineTo(player.x, player.y + 15);
    ctx.lineTo(player.x + 5, player.y + 10);
    ctx.lineTo(player.x + 20, player.y + 15);
    ctx.closePath();
    ctx.fill();
    
    // 驾驶舱
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(player.x, player.y - 5, 5, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.restore();
}

// 绘制敌人
function drawEnemy(e) {
    ctx.save();
    ctx.fillStyle = e.color;
    ctx.shadowColor = e.color;
    ctx.shadowBlur = 10;
    
    ctx.beginPath();
    ctx.moveTo(e.x, e.y - e.height/2);
    ctx.lineTo(e.x + e.width/2, e.y + e.height/4);
    ctx.lineTo(e.x + e.width/4, e.y + e.height/2);
    ctx.lineTo(e.x - e.width/4, e.y + e.height/2);
    ctx.lineTo(e.x - e.width/2, e.y + e.height/4);
    ctx.closePath();
    ctx.fill();
    
    // 眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(e.x - 6, e.y - 2, 4, 0, Math.PI * 2);
    ctx.arc(e.x + 6, e.y - 2, 4, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(e.x - 5, e.y - 2, 2, 0, Math.PI * 2);
    ctx.arc(e.x + 7, e.y - 2, 2, 0, Math.PI * 2);
    ctx.fill();
    
    // 血条
    if (e.hp < e.maxHp) {
        ctx.fillStyle = '#333';
        ctx.fillRect(e.x - 20, e.y - e.height/2 - 8, 40, 4);
        ctx.fillStyle = e.color;
        ctx.fillRect(e.x - 20, e.y - e.height/2 - 8, 40 * (e.hp / e.maxHp), 4);
    }
    
    ctx.restore();
}

// 绘制Boss
function drawBoss(b) {
    ctx.save();
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 20;
    
    // Boss主体
    ctx.beginPath();
    ctx.moveTo(b.x, b.y - b.height/2);
    ctx.lineTo(b.x + b.width/2, b.y);
    ctx.lineTo(b.x + b.width/3, b.y + b.height/2);
    ctx.lineTo(b.x - b.width/3, b.y + b.height/2);
    ctx.lineTo(b.x - b.width/2, b.y);
    ctx.closePath();
    ctx.fill();
    
    // Boss眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(b.x - 15, b.y - 10, 8, 0, Math.PI * 2);
    ctx.arc(b.x + 15, b.y - 10, 8, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#f00';
    ctx.beginPath();
    ctx.arc(b.x - 12, b.y - 10, 4, 0, Math.PI * 2);
    ctx.arc(b.x + 18, b.y - 10, 4, 0, Math.PI * 2);
    ctx.fill();
    
    // Boss血条
    let barWidth = 150;
    ctx.fillStyle = '#333';
    ctx.fillRect(b.x - barWidth/2, b.y - b.height/2 - 15, barWidth, 8);
    ctx.fillStyle = '#f00';
    ctx.fillRect(b.x - barWidth/2, b.y - b.height/2 - 15, barWidth * (b.hp / b.maxHp), 8);
    ctx.strokeStyle = '#fff';
    ctx.strokeRect(b.x - barWidth/2, b.y - b.height/2 - 15, barWidth, 8);
    
    ctx.restore();
}

// 绘制子弹
function drawBullet(b) {
    ctx.save();
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

// 绘制道具
function drawPowerUp(p) {
    ctx.save();
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 15;
    
    let pulse = Math.sin(Date.now() * 0.005) * 3;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 12 + pulse, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#000';
    ctx.font = '16px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.symbol, p.x, p.y);
    
    ctx.restore();
}

// 绘制粒子
function drawParticles() {
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
}

// 绘制冲击波
function drawExplosions() {
    explosions.forEach(e => {
        ctx.strokeStyle = e.color;
        ctx.globalAlpha = e.life * 0.5;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
        ctx.stroke();
    });
    ctx.globalAlpha = 1;
}

// 绘制HUD
function drawHUD() {
    let fontSize = Math.floor(canvas.width / 25);
    
    ctx.fillStyle = '#0ff';
    ctx.font = `bold ${fontSize}px Courier New`;
    ctx.textAlign = 'left';
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 10;
    ctx.fillText(`分数: ${game.score}`, 10, fontSize + 5);
    
    ctx.textAlign = 'center';
    ctx.fillText(`第 ${game.level} 波`, canvas.width / 2, fontSize + 5);
    
    ctx.textAlign = 'right';
    ctx.fillText('❤️'.repeat(player.lives), canvas.width - 10, fontSize + 5);
    
    // 连击显示
    if (game.combo > 1) {
        ctx.fillStyle = '#ff0';
        ctx.font = `bold ${fontSize * 1.2}px Courier New`;
        ctx.textAlign = 'center';
        ctx.fillText(`${game.combo} COMBO!`, canvas.width / 2, fontSize * 2.5);
    }
    
    // 火力等级
    ctx.textAlign = 'left';
    ctx.font = `${fontSize * 0.7}px Courier New`;
    ctx.fillStyle = '#ff0';
    ctx.fillText(`火力: ${'⚡'.repeat(player.powerLevel)}`, 10, fontSize * 2 + 5);
    
    ctx.shadowBlur = 0;
}

// 绘制开始界面
function drawStartScreen() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawStars();
    
    let titleSize = Math.floor(canvas.width / 12);
    let textSize = Math.floor(canvas.width / 25);
    
    ctx.fillStyle = '#0ff';
    ctx.font = `bold ${titleSize}px Courier New`;
    ctx.textAlign = 'center';
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 20;
    ctx.fillText('🚀 太空射击', canvas.width / 2, canvas.height * 0.3);
    
    ctx.font = `${textSize}px Courier New`;
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 0;
    ctx.fillText('手指拖动飞船移动', canvas.width / 2, canvas.height * 0.5);
    ctx.fillText('飞船自动射击', canvas.width / 2, canvas.height * 0.55);
    ctx.fillText('消灭敌人！小心Boss！', canvas.width / 2, canvas.height * 0.6);
    
    if (game.highScore > 0) {
        ctx.fillStyle = '#ff0';
        ctx.fillText(`最高分: ${game.highScore}`, canvas.width / 2, canvas.height * 0.7);
    }
    
    let pulse = Math.sin(Date.now() * 0.003) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(0, 255, 255, ${pulse})`;
    ctx.font = `bold ${textSize * 1.2}px Courier New`;
    ctx.fillText('点击开始', canvas.width / 2, canvas.height * 0.8);
}

// 绘制结束界面
function drawGameOverScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.9)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    let titleSize = Math.floor(canvas.width / 12);
    let textSize = Math.floor(canvas.width / 25);
    
    ctx.fillStyle = '#ff0040';
    ctx.font = `bold ${titleSize}px Courier New`;
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ff0040';
    ctx.shadowBlur = 20;
    ctx.fillText('💥 游戏结束', canvas.width / 2, canvas.height * 0.25);
    
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#0ff';
    ctx.font = `${textSize}px Courier New`;
    ctx.fillText(`最终得分: ${game.score}`, canvas.width / 2, canvas.height * 0.4);
    ctx.fillText(`消灭敌人: ${game.kills}`, canvas.width / 2, canvas.height * 0.46);
    ctx.fillText(`最高连击: ${game.maxCombo}`, canvas.width / 2, canvas.height * 0.52);
    
    if (game.score >= game.highScore && game.score > 0) {
        ctx.fillStyle = '#ff0';
        ctx.font = `bold ${textSize * 1.2}px Courier New`;
        ctx.fillText('🏆 新纪录！', canvas.width / 2, canvas.height * 0.62);
    } else {
        ctx.fillStyle = '#888';
        ctx.font = `${textSize * 0.8}px Courier New`;
        ctx.fillText(`最高分: ${game.highScore}`, canvas.width / 2, canvas.height * 0.62);
    }
    
    let pulse = Math.sin(Date.now() * 0.003) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(0, 255, 255, ${pulse})`;
    ctx.font = `bold ${textSize * 1.2}px Courier New`;
    ctx.fillText('点击重新开始', canvas.width / 2, canvas.height * 0.78);
}

// 碰撞检测
function checkCollision(a, b) {
    return Math.abs(a.x - b.x) < (a.width + b.width) / 2 &&
           Math.abs(a.y - b.y) < (a.height + b.height) / 2;
}

// 生成敌人
function spawnEnemy() {
    let typeIndex = 0;
    let rand = Math.random();
    if (game.level >= 5 && rand < 0.1) typeIndex = 3;
    else if (game.level >= 3 && rand < 0.2) typeIndex = 2;
    else if (game.level >= 2 && rand < 0.3) typeIndex = 1;
    
    let type = enemyTypes[typeIndex];
    enemies.push({
        x: Math.random() * (canvas.width - type.width) + type.width/2,
        y: -type.height,
        width: type.width,
        height: type.height,
        speed: type.speed * (canvas.height / 800),
        hp: type.hp,
        maxHp: type.hp,
        score: type.score,
        color: type.color,
        pattern: type.pattern,
        timer: Math.random() * Math.PI * 2,
        startX: Math.random() * (canvas.width - type.width) + type.width/2
    });
}

// 生成道具
function spawnPowerUp(x, y) {
    if (Math.random() > 0.15) return;
    let type = powerUpTypes[Math.floor(Math.random() * powerUpTypes.length)];
    powerUps.push({
        x, y,
        width: 25,
        height: 25,
        speed: 1.5 * (canvas.height / 800),
        ...type,
        timer: 0
    });
}

// Boss射击
function bossShoot(b) {
    let bulletSpeed = 4 * (canvas.height / 800);
    
    switch(b.phase % 3) {
        case 0: // 三发散射
            for (let i = -1; i <= 1; i++) {
                bullets.push({
                    x: b.x, y: b.y + b.height/2,
                    vx: i * 2, vy: bulletSpeed,
                    size: 5, color: '#f00', isEnemy: true
                });
            }
            break;
        case 1: // 追踪弹
            let dx = player.x - b.x;
            let dy = player.y - b.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            bullets.push({
                x: b.x, y: b.y + b.height/2,
                vx: (dx/dist) * bulletSpeed * 1.2,
                vy: (dy/dist) * bulletSpeed * 1.2,
                size: 6, color: '#ff0', isEnemy: true, homing: true
            });
            break;
        case 2: // 圆形弹幕
            for (let i = 0; i < 8; i++) {
                let angle = (Math.PI * 2 / 8) * i;
                bullets.push({
                    x: b.x, y: b.y,
                    vx: Math.cos(angle) * bulletSpeed * 0.8,
                    vy: Math.sin(angle) * bulletSpeed * 0.8,
                    size: 4, color: '#f0f', isEnemy: true
                });
            }
            break;
    }
}

// 更新游戏
let shootTimer = 0;
function update() {
    if (screen !== 'playing') return;
    
    // 屏幕震动
    if (game.shakeTime > 0) {
        game.shakeX = (Math.random() - 0.5) * game.shakeTime;
        game.shakeY = (Math.random() - 0.5) * game.shakeTime;
        game.shakeTime -= 0.5;
    } else {
        game.shakeX = 0;
        game.shakeY = 0;
    }
    
    // 边界限制
    player.x = Math.max(25, Math.min(canvas.width - 25, player.x));
    player.y = Math.max(25, Math.min(canvas.height - 25, player.y));
    
    // 无敌时间
    if (player.invincible > 0) player.invincible--;
    
    // 连击计时
    if (game.comboTimer > 0) {
        game.comboTimer--;
        if (game.comboTimer <= 0) game.combo = 0;
    }
    
    // 自动射击
    shootTimer++;
    let shootRate = player.powerLevel >= 3 ? 6 : 8;
    if (shootTimer >= shootRate) {
        shoot();
        shootTimer = 0;
    }
    
    // 生成敌人
    if (!boss) {
        game.spawnTimer++;
        if (game.spawnTimer >= game.spawnRate) {
            spawnEnemy();
            game.spawnTimer = 0;
        }
        
        // Boss检查
        if (game.level % 5 === 0 && enemies.length === 0) {
            boss = createBoss();
        }
    }
    
    // 升级检查
    let newLevel = Math.floor(game.score / 200) + 1;
    if (newLevel > game.level) {
        game.level = newLevel;
        game.spawnRate = Math.max(20, 60 - game.level * 5);
        createExplosion(canvas.width / 2, canvas.height / 2, 30, '#ff0');
    }
    
    // 更新Boss
    if (boss) {
        if (boss.entering) {
            boss.y += 1;
            if (boss.y >= boss.targetY) boss.entering = false;
        } else {
            boss.timer += 0.02;
            boss.x = canvas.width/2 + Math.sin(boss.timer) * (canvas.width * 0.3);
            
            boss.shootTimer++;
            if (boss.shootTimer >= 45) {
                bossShoot(boss);
                boss.shootTimer = 0;
                boss.phase++;
            }
        }
    }
    
    // 更新子弹
    bullets = bullets.filter(b => {
        if (b.homing && !b.isEnemy && enemies.length > 0) {
            let target = enemies[0];
            let dx = target.x - b.x;
            let dy = target.y - b.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            b.vx += (dx/dist) * 0.3;
            b.vy += (dy/dist) * 0.3;
            let speed = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
            b.vx = (b.vx/speed) * 7;
            b.vy = (b.vy/speed) * 7;
        }
        b.x += b.vx;
        b.y += b.vy;
        return b.y > -10 && b.y < canvas.height + 10 && b.x > -10 && b.x < canvas.width + 10;
    });
    
    // 更新敌人
    enemies = enemies.filter(e => {
        e.timer += 0.02;
        
        switch(e.pattern) {
            case 'straight':
                e.y += e.speed;
                break;
            case 'zigzag':
                e.y += e.speed;
                e.x = e.startX + Math.sin(e.timer * 3) * 50;
                break;
            case 'sine':
                e.y += e.speed;
                e.x = e.startX + Math.sin(e.timer * 2) * 80;
                break;
            case 'chase':
                e.y += e.speed;
                let dx = player.x - e.x;
                e.x += Math.sign(dx) * Math.min(Math.abs(dx) * 0.02, 2);
                break;
        }
        
        // 子弹vs敌人
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            if (b.isEnemy) continue;
            if (Math.abs(b.x - e.x) < e.width/2 + b.size && 
                Math.abs(b.y - e.y) < e.height/2 + b.size) {
                bullets.splice(i, 1);
                e.hp--;
                playSound('hit');
                
                if (e.hp <= 0) {
                    game.kills++;
                    game.combo++;
                    game.comboTimer = 120;
                    game.maxCombo = Math.max(game.maxCombo, game.combo);
                    let comboBonus = Math.min(game.combo, 10);
                    game.score += e.score * comboBonus;
                    createExplosion(e.x, e.y, 20, e.color);
                    spawnPowerUp(e.x, e.y);
                    playSound('boom');
                    return false;
                }
            }
        }
        
        // 玩家vs敌人
        if (player.invincible <= 0 && checkCollision(player, e)) {
            player.lives--;
            player.invincible = 120;
            player.powerLevel = Math.max(1, player.powerLevel - 1);
            createExplosion(e.x, e.y, 25, '#f00');
            game.shakeTime = 15;
            game.combo = 0;
            playSound('boom');
            
            if (player.lives <= 0) {
                game.running = false;
                if (game.score > game.highScore) {
                    game.highScore = game.score;
                    localStorage.setItem('highScore', game.highScore);
                }
                screen = 'gameover';
            }
            return false;
        }
        
        return e.y < canvas.height + 50;
    });
    
    // 玩家子弹vs Boss
    if (boss && !boss.entering) {
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            if (b.isEnemy) continue;
            if (Math.abs(b.x - boss.x) < boss.width/2 + b.size && 
                Math.abs(b.y - boss.y) < boss.height/2 + b.size) {
                bullets.splice(i, 1);
                boss.hp--;
                playSound('hit');
                
                if (boss.hp <= 0) {
                    game.score += 500;
                    game.kills++;
                    createExplosion(boss.x, boss.y, 50, boss.color);
                    playSound('boom');
                    boss = null;
                    break;
                }
            }
        }
        
        // Boss vs 玩家
        if (boss && player.invincible <= 0 && checkCollision(player, boss)) {
            player.lives--;
            player.invincible = 120;
            player.powerLevel = Math.max(1, player.powerLevel - 1);
            createExplosion(player.x, player.y, 25, '#f00');
            game.shakeTime = 15;
            playSound('boom');
            
            if (player.lives <= 0) {
                if (game.score > game.highScore) {
                    game.highScore = game.score;
                    localStorage.setItem('highScore', game.highScore);
                }
                screen = 'gameover';
            }
        }
    }
    
    // 敌人子弹vs玩家
    bullets = bullets.filter(b => {
        if (!b.isEnemy) return true;
        if (player.invincible <= 0 && 
            Math.abs(b.x - player.x) < 20 + b.size && 
            Math.abs(b.y - player.y) < 20 + b.size) {
            player.lives--;
            player.invincible = 120;
            player.powerLevel = Math.max(1, player.powerLevel - 1);
            createExplosion(player.x, player.y, 25, '#f00');
            game.shakeTime = 15;
            game.combo = 0;
            playSound('boom');
            
            if (player.lives <= 0) {
                if (game.score > game.highScore) {
                    game.highScore = game.score;
                    localStorage.setItem('highScore', game.highScore);
                }
                screen = 'gameover';
            }
            return false;
        }
        return true;
    });
    
    // 更新道具
    powerUps = powerUps.filter(p => {
        p.y += p.speed;
        
        if (checkCollision(player, p)) {
            playSound('powerup');
            switch(p.type) {
                case 'power':
                    player.powerLevel = Math.min(4, player.powerLevel + 1);
                    break;
                case 'life':
                    player.lives = Math.min(5, player.lives + 1);
                    break;
                case 'shield':
                    player.invincible = 180;
                    break;
            }
            createExplosion(p.x, p.y, 10, p.color);
            return false;
        }
        return p.y < canvas.height + 20;
    });
    
    // 更新粒子
    particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        p.vx *= 0.98;
        p.vy *= 0.98;
        return p.life > 0;
    });
    
    // 更新冲击波
    explosions = explosions.filter(e => {
        e.radius += 3;
        e.life -= 0.03;
        return e.life > 0;
    });
}

// 渲染
function render() {
    ctx.save();
    ctx.translate(game.shakeX, game.shakeY);
    
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 星星
    stars.forEach(s => {
        s.y += s.speed;
        if (s.y > canvas.height) {
            s.y = 0;
            s.x = Math.random() * canvas.width;
        }
    });
    drawStars();
    
    drawParticles();
    drawExplosions();
    bullets.forEach(drawBullet);
    powerUps.forEach(drawPowerUp);
    enemies.forEach(drawEnemy);
    if (boss) drawBoss(boss);
    drawPlayer();
    drawHUD();
    
    ctx.restore();
}

// 主循环
function gameLoop() {
    if (screen === 'start') {
        drawStartScreen();
    } else if (screen === 'playing') {
        update();
        render();
    } else if (screen === 'gameover') {
        render();
        drawGameOverScreen();
    }
    requestAnimationFrame(gameLoop);
}

// 触摸控制
let isTouching = false;
let touchOffsetX = 0;
let touchOffsetY = 0;

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    initAudio();
    
    if (screen === 'start') {
        init();
        return;
    }
    if (screen === 'gameover') {
        screen = 'start';
        return;
    }
    
    let touch = e.touches[0];
    let rect = canvas.getBoundingClientRect();
    let scaleX = canvas.width / rect.width;
    let scaleY = canvas.height / rect.height;
    let tx = (touch.clientX - rect.left) * scaleX;
    let ty = (touch.clientY - rect.top) * scaleY;
    
    isTouching = true;
    touchOffsetX = player.x - tx;
    touchOffsetY = player.y - ty;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!isTouching || screen !== 'playing') return;
    
    let touch = e.touches[0];
    let rect = canvas.getBoundingClientRect();
    let scaleX = canvas.width / rect.width;
    let scaleY = canvas.height / rect.height;
    let tx = (touch.clientX - rect.left) * scaleX;
    let ty = (touch.clientY - rect.top) * scaleY;
    
    player.x = tx + touchOffsetX;
    player.y = ty + touchOffsetY;
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    isTouching = false;
}, { passive: false });

// 鼠标控制
let isMouseDown = false;

canvas.addEventListener('mousedown', (e) => {
    initAudio();
    
    if (screen === 'start') {
        init();
        return;
    }
    if (screen === 'gameover') {
        screen = 'start';
        return;
    }
    
    let rect = canvas.getBoundingClientRect();
    let scaleX = canvas.width / rect.width;
    let scaleY = canvas.height / rect.height;
    let mx = (e.clientX - rect.left) * scaleX;
    let my = (e.clientY - rect.top) * scaleY;
    
    isMouseDown = true;
    touchOffsetX = player.x - mx;
    touchOffsetY = player.y - my;
});

canvas.addEventListener('mousemove', (e) => {
    if (!isMouseDown || screen !== 'playing') return;
    let rect = canvas.getBoundingClientRect();
    let scaleX = canvas.width / rect.width;
    let scaleY = canvas.height / rect.height;
    let mx = (e.clientX - rect.left) * scaleX;
    let my = (e.clientY - rect.top) * scaleY;
    
    player.x = mx + touchOffsetX;
    player.y = my + touchOffsetY;
});

canvas.addEventListener('mouseup', () => { isMouseDown = false; });
canvas.addEventListener('mouseleave', () => { isMouseDown = false; });

// 开始游戏循环
gameLoop();
</script>
