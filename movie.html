<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⭐ 小星星回家记</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    background: #000; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    overflow: hidden;
    font-family: 'Arial', sans-serif;
}
canvas { 
    display: block;
    max-width: 100vw;
    max-height: 100vh;
}
#overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.8);
    z-index: 10;
    color: #fff;
    text-align: center;
    cursor: pointer;
}
#overlay h1 {
    font-size: 48px;
    color: #FFD700;
    text-shadow: 0 0 30px #FFD700;
    margin-bottom: 20px;
}
#overlay p {
    font-size: 24px;
    opacity: 0.8;
}
#subtitle {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 28px;
    text-shadow: 0 0 10px rgba(0,0,0,0.8);
    z-index: 5;
    text-align: center;
    opacity: 0;
    transition: opacity 0.5s;
    pointer-events: none;
    max-width: 80%;
}
</style>
</head>
<body>

<canvas id="movie"></canvas>
<div id="subtitle"></div>
<div id="overlay" onclick="startMovie()">
    <h1>⭐ 小星星回家记</h1>
    <p>点击屏幕开始观看</p>
</div>

<script>
const canvas = document.getElementById('movie');
const ctx = canvas.getContext('2d');
const subtitle = document.getElementById('subtitle');
const overlay = document.getElementById('overlay');

canvas.width = 800;
canvas.height = 600;

// 电影状态
let movie = {
    playing: false,
    scene: 0,
    timer: 0,
    alpha: 1,
    fadeDir: 0
};

// 场景时间（秒）
const sceneTimes = [0, 4, 8, 13, 18, 24, 30, 36, 42, 48, 55];

// 字幕
const subtitles = [
    "",  // 0: 标题
    "在浩瀚的宇宙中，住着一颗小星星...",  // 1
    "它每天都在夜空中闪烁，为迷路的人照亮方向",  // 2
    "有一天，一阵宇宙风吹来，小星星迷路了...",  // 3
    "它离开了自己的位置，飘向了陌生的地方",  // 4
    "小星星很害怕，但它没有放弃",  // 5
    "它飞过了美丽的星云...",  // 6
    "遇到了友好的流星朋友",  // 7
    "终于，它看到了远处那颗熟悉的蓝色星球",  // 8
    "小星星找到了回家的路！",  // 9
    "从此以后，它更加努力地发光，因为知道家的珍贵"  // 10
];

// 星星主角
let star = {
    x: 400,
    y: 150,
    size: 20,
    brightness: 1,
    trail: []
};

// 背景星星
let bgStars = [];
for (let i = 0; i < 300; i++) {
    bgStars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2 + 0.5,
        speed: Math.random() * 0.5 + 0.1,
        brightness: Math.random()
    });
}

// 星云
let nebulae = [];
for (let i = 0; i < 5; i++) {
    nebulae.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 100 + 50,
        color: ['#ff6b9d', '#c44dff', '#4dabff', '#ff9f43', '#54a0ff'][i],
        alpha: 0.1 + Math.random() * 0.1
    });
}

// 流星
let meteors = [];

// 地球
let earth = {
    x: 700,
    y: 400,
    radius: 60,
    clouds: []
};
for (let i = 0; i < 8; i++) {
    earth.clouds.push({
        angle: Math.random() * Math.PI * 2,
        y: Math.random() * 60 - 30,
        size: Math.random() * 20 + 10
    });
}

// 粒子效果
let particles = [];

// 获取当前时间（秒）
function getTime() {
    return movie.timer / 60;
}

// 显示字幕
function showSubtitle(text) {
    subtitle.textContent = text;
    subtitle.style.opacity = text ? '1' : '0';
}

// 创建粒子
function createParticles(x, y, count, color) {
    for (let i = 0; i < count; i++) {
        let angle = (Math.PI * 2 / count) * i;
        let speed = Math.random() * 3 + 1;
        particles.push({
            x: x,
            y: y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            decay: Math.random() * 0.02 + 0.01,
            size: Math.random() * 4 + 2,
            color: color || '#FFD700'
        });
    }
}

// 绘制星星
function drawStar(x, y, size, brightness) {
    ctx.save();
    ctx.fillStyle = `rgba(255, 215, 0, ${brightness})`;
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 20;
    
    // 星星形状
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
        let angle = (i * 4 * Math.PI / 5) - Math.PI / 2;
        let px = x + Math.cos(angle) * size;
        let py = y + Math.sin(angle) * size;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    
    // 内部光晕
    let gradient = ctx.createRadialGradient(x, y, 0, x, y, size * 1.5);
    gradient.addColorStop(0, `rgba(255, 255, 200, ${brightness * 0.5})`);
    gradient.addColorStop(1, 'rgba(255, 215, 0, 0)');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(x, y, size * 1.5, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.restore();
}

// 绘制背景星星
function drawBgStars() {
    bgStars.forEach(s => {
        let b = s.brightness * (0.5 + 0.5 * Math.sin(movie.timer * 0.02 + s.x));
        ctx.fillStyle = `rgba(255, 255, 255, ${b})`;
        ctx.fillRect(s.x, s.y, s.size, s.size);
    });
}

// 绘制星云
function drawNebulae(alpha) {
    nebulae.forEach(n => {
        let gradient = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.radius);
        gradient.addColorStop(0, n.color + Math.floor(n.alpha * alpha * 255).toString(16).padStart(2, '0'));
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
        ctx.fill();
    });
}

// 绘制地球
function drawEarth(x, y, radius, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    
    // 地球本体
    let gradient = ctx.createRadialGradient(x - radius * 0.2, y - radius * 0.2, 0, x, y, radius);
    gradient.addColorStop(0, '#4dabff');
    gradient.addColorStop(0.7, '#1a75ff');
    gradient.addColorStop(1, '#0040a0');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
    
    // 陆地
    ctx.fillStyle = '#2d8a4e';
    ctx.beginPath();
    ctx.ellipse(x - 10, y - 5, radius * 0.4, radius * 0.3, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 15, y + 10, radius * 0.3, radius * 0.2, -0.5, 0, Math.PI * 2);
    ctx.fill();
    
    // 云层
    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
    earth.clouds.forEach(c => {
        let cx = x + Math.cos(c.angle + movie.timer * 0.002) * (radius * 0.7);
        let cy = y + c.y;
        ctx.beginPath();
        ctx.arc(cx, cy, c.size, 0, Math.PI * 2);
        ctx.fill();
    });
    
    // 光晕
    let glow = ctx.createRadialGradient(x, y, radius, x, y, radius * 1.3);
    glow.addColorStop(0, 'rgba(100, 180, 255, 0.3)');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(x, y, radius * 1.3, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.restore();
}

// 绘制流星
function drawMeteors() {
    meteors.forEach(m => {
        ctx.save();
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(m.x, m.y);
        ctx.lineTo(m.x - m.vx * 10, m.y - m.vy * 10);
        ctx.stroke();
        
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(m.x, m.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    });
}

// 绘制粒子
function drawParticles() {
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
}

// 更新场景
function updateScene() {
    let time = getTime();
    let scene = 0;
    
    // 确定当前场景
    for (let i = sceneTimes.length - 1; i >= 0; i--) {
        if (time >= sceneTimes[i]) {
            scene = i;
            break;
        }
    }
    
    // 更新字幕
    if (scene !== movie.scene) {
        movie.scene = scene;
        showSubtitle(subtitles[scene]);
    }
    
    // 场景动画
    switch(scene) {
        case 0: // 标题场景
            star.x = 400 + Math.sin(movie.timer * 0.02) * 50;
            star.y = 150 + Math.cos(movie.timer * 0.03) * 20;
            break;
            
        case 1: // 介绍小星星
            star.x = 400 + Math.sin(movie.timer * 0.02) * 80;
            star.y = 150 + Math.cos(movie.timer * 0.03) * 30;
            star.brightness = 0.7 + 0.3 * Math.sin(movie.timer * 0.05);
            break;
            
        case 2: // 继续闪烁
            star.x = 400 + Math.sin(movie.timer * 0.02) * 80;
            star.y = 150 + Math.cos(movie.timer * 0.03) * 30;
            star.brightness = 0.7 + 0.3 * Math.sin(movie.timer * 0.08);
            break;
            
        case 3: // 宇宙风吹来
            star.x += 2;
            star.y += 0.5;
            if (movie.timer % 10 === 0) {
                createParticles(star.x, star.y, 3, '#87CEEB');
            }
            break;
            
        case 4: // 飘向陌生地方
            star.x += 1.5;
            star.y += 1;
            star.trail.push({x: star.x, y: star.y, life: 1});
            break;
            
        case 5: // 没有放弃
            star.x += Math.sin(movie.timer * 0.05) * 2;
            star.y += 0.5;
            star.brightness = 0.8 + 0.2 * Math.sin(movie.timer * 0.1);
            break;
            
        case 6: // 飞过星云
            star.x += 1;
            star.y -= 0.3;
            nebulae.forEach(n => {
                n.x -= 0.5;
                if (n.x < -n.radius) n.x = canvas.width + n.radius;
            });
            break;
            
        case 7: // 遇到流星朋友
            star.x += 0.5;
            star.y += 0.2;
            if (movie.timer % 30 === 0) {
                meteors.push({
                    x: Math.random() * canvas.width,
                    y: -20,
                    vx: -2 + Math.random() * 4,
                    vy: 3 + Math.random() * 2
                });
            }
            break;
            
        case 8: // 看到地球
            star.x += (500 - star.x) * 0.02;
            star.y += (200 - star.y) * 0.02;
            earth.x = 700;
            earth.y = 400;
            break;
            
        case 9: // 找到回家的路
            star.x += (400 - star.x) * 0.03;
            star.y += (150 - star.y) * 0.03;
            if (movie.timer % 5 === 0) {
                createParticles(star.x, star.y, 2, '#FFD700');
            }
            break;
            
        case 10: // 结局
            star.x = 400 + Math.sin(movie.timer * 0.02) * 30;
            star.y = 150 + Math.cos(movie.timer * 0.03) * 10;
            star.brightness = 1;
            star.size = 25;
            break;
    }
    
    // 更新流星
    meteors = meteors.filter(m => {
        m.x += m.vx;
        m.y += m.vy;
        return m.y < canvas.height + 20;
    });
    
    // 更新粒子
    particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        return p.life > 0;
    });
    
    // 更新星星尾巴
    star.trail = star.trail.filter(t => {
        t.life -= 0.02;
        return t.life > 0;
    });
}

// 渲染
function render() {
    // 清空画布
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    let time = getTime();
    
    // 背景星星
    drawBgStars();
    
    // 星云（场景6更明显）
    let nebulaAlpha = time >= 24 && time < 30 ? 0.3 : 0.1;
    drawNebulae(nebulaAlpha);
    
    // 地球（场景8-10）
    if (time >= 36) {
        let earthAlpha = Math.min(1, (time - 36) / 3);
        drawEarth(earth.x, earth.y, earth.radius, earthAlpha);
    }
    
    // 流星
    drawMeteors();
    
    // 星星尾巴
    star.trail.forEach(t => {
        ctx.fillStyle = `rgba(255, 215, 0, ${t.life * 0.5})`;
        ctx.beginPath();
        ctx.arc(t.x, t.y, star.size * t.life * 0.5, 0, Math.PI * 2);
        ctx.fill();
    });
    
    // 小星星
    drawStar(star.x, star.y, star.size, star.brightness);
    
    // 粒子效果
    drawParticles();
    
    // 标题（场景0）
    if (time < 4) {
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 20;
        ctx.fillText('⭐ 小星星回家记', canvas.width / 2, canvas.height / 2);
        ctx.shadowBlur = 0;
    }
    
    // 结束字幕（场景10）
    if (time >= 48) {
        let endAlpha = Math.min(1, (time - 48) / 3);
        ctx.fillStyle = `rgba(255, 255, 255, ${endAlpha})`;
        ctx.font = '24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('~ 完 ~', canvas.width / 2, canvas.height - 100);
    }
}

// 主循环
function movieLoop() {
    if (!movie.playing) return;
    
    movie.timer++;
    updateScene();
    render();
    
    // 电影结束
    if (getTime() > 55) {
        movie.playing = false;
        overlay.style.display = 'flex';
        overlay.querySelector('h1').textContent = '⭐ 再看一次？';
        overlay.querySelector('p').textContent = '点击屏幕重新观看';
    }
    
    requestAnimationFrame(movieLoop);
}

// 开始电影
function startMovie() {
    overlay.style.display = 'none';
    movie.playing = true;
    movie.timer = 0;
    movie.scene = -1;
    star.x = 400;
    star.y = 150;
    star.size = 20;
    star.brightness = 1;
    star.trail = [];
    particles = [];
    meteors = [];
    movieLoop();
}

// 窗口大小调整
function resize() {
    let ratio = canvas.width / canvas.height;
    let windowRatio = window.innerWidth / window.innerHeight;
    
    if (windowRatio > ratio) {
        canvas.style.height = '100vh';
        canvas.style.width = 'auto';
    } else {
        canvas.style.width = '100vw';
        canvas.style.height = 'auto';
    }
}

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
